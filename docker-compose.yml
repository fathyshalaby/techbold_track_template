services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ./keys:/keys:ro
      - autopilot-data:/app/apps/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  frontend-vite:
    profiles:
      - fallback
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  model:
    profiles:
      - model
    build:
      context: ./apps/model
      dockerfile: Dockerfile
    environment:
      PORT: 8001
      HF_HOME: /workspace/model/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      BASE_MODEL: ${MODEL_BASE_MODEL:-mistralai/Ministral-3-14B-Instruct-2512}
      ADAPTER_PATH: ${MODEL_ADAPTER_PATH:-outputs/adapter}
      LORA_NAME: ${MODEL_LORA_NAME:-msp}
    ports:
      - "${MODEL_PORT:-8001}:8001"
    volumes:
      - ./apps/model/outputs:/workspace/model/outputs:ro
      - model-hf-cache:/workspace/model/.cache/huggingface
    command: make serve
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Secondary backend: the Python/FastAPI implementation. Opt-in (profile: py) so the
  # node backend stays the default on :8000. Its auto-drive run engine (selective HITL)
  # is the unattended-autograde-capable variant. Runs on :8002 to coexist with node.
  backend-py:
    profiles:
      - py
    build:
      context: ./apps/backend-py
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8002:8000"
    volumes:
      - ./keys:/keys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  autopilot-data:
  model-hf-cache:
