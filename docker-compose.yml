services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ./keys:/keys:ro
      - autopilot-data:/app/apps/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  autopilot-data:
