services:
  # ---- Python build (FastAPI + paramiko + openai SDK) — port 8000 ----
  backend-py:
    build: ./backend-py
    env_file:
      - path: .env
        required: false   # copy .env.example -> .env; the stack still starts without it
    environment:
      SHARED_DIR: /shared
    ports:
      - "8000:8000"
    volumes:
      - ./keys:/keys:ro          # your SSH private key(s) — git-ignored
      - ./shared:/shared:ro      # safety rules + prompts (single source of truth)
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach a host-run Phoenix mock / local LLM
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Node build (Vercel AI SDK + ssh2) — port 8001 ----
  backend-node:
    build: ./backend-node
    env_file:
      - path: .env
        required: false
    environment:
      SHARED_DIR: /shared
      PORT: "8001"
    ports:
      - "8001:8001"
    volumes:
      - ./keys:/keys:ro
      - ./shared:/shared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  # ---- React technician workspace (Vite) — port 5173 ----
  frontend:
    build: ./frontend
    environment:
      # Point at backend-py (8000) or backend-node (8001) to demo either build.
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend-py:
        condition: service_healthy
