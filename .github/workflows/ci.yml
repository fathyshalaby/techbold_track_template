name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: workspace check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

  # The Python sidecar is lint-only in CI. It has no test suite; its make
  # targets require heavy ML dependencies (torch, transformers) unsuitable for CI.
  model:
    name: model lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install ruff
        run: uv tool install ruff

      - name: Ruff check
        run: ruff check apps/model/src --config apps/model/pyproject.toml

      - name: Ruff format
        run: ruff format --check apps/model/src --config apps/model/pyproject.toml
