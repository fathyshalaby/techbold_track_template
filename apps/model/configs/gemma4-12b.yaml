# Optional Google Gemma 4 fallback config.
base_model: ${BASE_MODEL:-google/gemma-4-12B-it}
model_loader: image-text
train_file: data/processed/train.jsonl
eval_file: data/processed/eval.jsonl
output_dir: outputs/adapter-gemma4
eval_score_file: outputs/eval_scores-gemma4.jsonl
max_seq_length: 8192
packing: true
assistant_only_loss: true
load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: bfloat16
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
target_modules: all-linear
num_train_epochs: 1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 0.0001
lr_scheduler_type: cosine
warmup_ratio: 0.03
logging_steps: 5
save_steps: 100
eval_steps: 100
save_total_limit: 2
gradient_checkpointing: true
optim: paged_adamw_8bit
bf16: true
fp16: false
seed: 42
