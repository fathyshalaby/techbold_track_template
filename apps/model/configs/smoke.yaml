# CPU/GPU smoke test. This verifies code paths, not final quality.
base_model: HuggingFaceTB/SmolLM2-135M-Instruct
model_loader: causal-lm
train_file: examples/train.jsonl
eval_file: examples/eval.jsonl
output_dir: outputs/smoke-adapter
eval_score_file: outputs/smoke-eval-scores.jsonl
max_seq_length: 1024
packing: false
assistant_only_loss: false
load_in_4bit: false
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules: all-linear
num_train_epochs: 1
max_steps: 2
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 0.0002
logging_steps: 1
save_steps: 2
eval_steps: 2
save_total_limit: 1
gradient_checkpointing: false
optim: adamw_torch
dataloader_pin_memory: false
bf16: false
fp16: false
seed: 42
